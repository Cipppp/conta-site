<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <style>
      .pnrr-text { font-family: Arial, Helvetica, sans-serif; }
    </style>
    <linearGradient id="pnrrGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003399"/>
      <stop offset="50%" style="stop-color:#FCD116"/>
      <stop offset="100%" style="stop-color:#CE1126"/>
    </linearGradient>
  </defs>
  <!-- PNRR Logo Mark -->
  <rect x="5" y="10" width="60" height="60" rx="10" fill="#003399"/>
  <text x="35" y="50" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" fill="white">PNRR</text>
  <!-- Green accent line -->
  <rect x="10" y="58" width="50" height="3" rx="1.5" fill="#4CAF50"/>
  <!-- Text -->
  <text x="78" y="28" class="pnrr-text" font-size="11" font-weight="600" fill="#1a1a1a">Planul Național</text>
  <text x="78" y="43" class="pnrr-text" font-size="11" font-weight="600" fill="#1a1a1a">de Redresare</text>
  <text x="78" y="58" class="pnrr-text" font-size="11" font-weight="600" fill="#1a1a1a">și Reziliență</text>
</svg>