<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80">
  <defs>
    <style>
      .gov-text { font-family: Arial, Helvetica, sans-serif; }
    </style>
  </defs>
  <!-- Romanian Flag Stripes -->
  <rect x="5" y="10" width="20" height="60" fill="#002B7F" rx="2"/>
  <rect x="25" y="10" width="20" height="60" fill="#FCD116"/>
  <rect x="45" y="10" width="20" height="60" fill="#CE1126" rx="2"/>
  <!-- Coat of Arms simplified (eagle) -->
  <g transform="translate(35, 40)" fill="#002B7F">
    <circle cx="0" cy="0" r="12" fill="#FCD116" stroke="#002B7F" stroke-width="1.5"/>
    <path d="M0,-8 L2,-3 L7,-3 L3,1 L5,7 L0,3 L-5,7 L-3,1 L-7,-3 L-2,-3 Z" fill="#002B7F" transform="scale(0.7)"/>
  </g>
  <!-- Text -->
  <text x="78" y="32" class="gov-text" font-size="14" font-weight="700" fill="#1a1a1a">GUVERNUL</text>
  <text x="78" y="52" class="gov-text" font-size="14" font-weight="700" fill="#1a1a1a">ROMANIEI</text>
</svg>